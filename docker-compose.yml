version: "3.9"

services:
  mysql:
    image: mysql:8.4.10
    container_name: ai-cs-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ai_customer_service
      MYSQL_USER: cs_user
      MYSQL_PASSWORD: cs_password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./db/mysql/data:/var/lib/mysql
      - ./db/mysql/conf/my.cnf:/etc/mysql/my.cnf:ro
      - ./db/mysql/log:/var/log/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-cs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./db/qdrant_data:/qdrant/storage

  redis:
    image: redis:8.8.0
    container_name: ai-cs-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4.3.2-management-alpine
    container_name: ai-cs-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  backend:
    build: ./backend
    container_name: ai-cs-backend
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - qdrant
      - redis
    environment:
      - MYSQL_HOST=mysql
      - QDRANT_HOST=qdrant
      - REDIS_URL=redis://redis:6379/0

  frontend:
    build: ./frontend
    container_name: ai-cs-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
